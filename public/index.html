<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,
          user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f13" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ассистент" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <title>Карманный ассистент</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0f0f13; overflow: hidden; }
      body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
      #root { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
      * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
      input, textarea, select { font-size: 16px !important; }
      ::-webkit-scrollbar { width: 0; height: 0; }
    </style>
  </head>
  <body>
    <noscript>Включите JavaScript.</noscript>
    <div id="root"></div>
  </body>
</html>
